<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile Remastered</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: 'Arial', sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; }

        /* LOBBİ / ANA MENYU */
        #lobby { position: absolute; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.85)), url('https://w0.peakpx.com/wallpaper/70/463/HD-wallpaper-pubg-mobile-pubg-mobile.jpg') no-repeat center; background-size: cover; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; z-index: 100; }
        #lobby-header { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        #game-logo { font-size: 38px; font-weight: 900; color: #f1c40f; letter-spacing: 4px; text-shadow: 3px 3px 0px #c0392b; }
        
        .settings-icon { font-size: 30px; cursor: pointer; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 50%; border: 2px solid #f1c40f; transition: 0.3s; }
        .settings-icon:hover { transform: rotate(90deg); color: #f1c40f; }

        #lobby-center { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #start-btn { padding: 18px 60px; font-size: 28px; background: #f39c12; color: #000; font-weight: bold; text-transform: uppercase; border: none; border-radius: 4px; cursor: pointer; box-shadow: 0 0 20px rgba(243,156,18,0.6); transition: 0.2s; }
        #start-btn:hover { background: #e67e22; transform: scale(1.05); }

        /* DİL VE SETTINGS PANELİ */
        .lang-selector { display: flex; gap: 10px; }
        .lang-btn { padding: 8px 15px; background: rgba(0,0,0,0.7); border: 1px solid #7f8c8d; color: #fff; cursor: pointer; font-weight: bold; }
        .lang-btn.active { border-color: #f1c40f; color: #f1c40f; }

        #settings-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; background: rgba(20, 24, 30, 0.95); border: 3px solid #f1c40f; padding: 30px; border-radius: 10px; display: none; z-index: 200; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .settings-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 18px; }
        .settings-row select, .settings-row input { padding: 5px; background: #34495e; color: #fff; border: 1px solid #f1c40f; }
        #close-settings { width: 100%; padding: 10px; background: #e74c3c; border: none; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* OYUN SAHƏSİ */
        #game-container { width: 100%; height: 100%; position: relative; cursor: crosshair; background: radial-gradient(circle, #34495e 0%, #1a252f 100%); display: none; }
        
        /* OYUN İÇİ HUD */
        #hud { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .hud-box { background: rgba(0, 0, 0, 0.75); padding: 12px 25px; border-radius: 3px; border: 1px solid #f1c40f; font-size: 20px; font-weight: bold; }
        #ammo-hud { border-color: #e74c3c; color: #e74c3c; display: flex; flex-direction: column; align-items: center; }

        /* NİŞANGAH (CROSSHAIR) */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); pointer-events: none; z-index: 99; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; }
        #crosshair::before { top: 14px; left: 0; width: 30px; height: 2px; }
        #crosshair::after { top: 0; left: 14px; width: 2px; height: 30px; }
        
        #hitmarker { position: absolute; top: 50%; left: 50%; width: 26px; height: 26px; transform: translate(-50%, -50%) rotate(45deg); pointer-events: none; display: none; z-index: 100; }
        #hitmarker::before, #hitmarker::after { content: ''; position: absolute; background: #e74c3c; }
        #hitmarker::before { top: 12px; left: 0; width: 26px; height: 2px; }
        #hitmarker::after { top: 0; left: 12px; width: 2px; height: 26px; }

        /* SİLAH (M416) VƏ REFILL (RELOAD) ANIMASİYASI */
        #weapon-wrapper { position: absolute; bottom: 0; right: 10%; width: 450px; pointer-events: none; transition: transform 0.1s; transform-origin: bottom right; z-index: 20; }
        .shoot-recoil { transform: translateY(20px) rotate(-6deg); }
        .reload-animation { transform: translateY(180px) rotate(15deg); transition: transform 0.5s ease-in-out; }

        /* BOTLAR */
        .target { position: absolute; width: 85px; height: 110px; background: url('https://img.icons8.com/color/96/pubg-helmet.png') no-repeat center, #2c3e50; background-size: 75%; border: 3px solid #e67e22; border-radius: 8px; cursor: pointer; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px; font-weight: bold; font-size: 13px; color: #f1c40f; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* SƏYYAR DÜYMƏLƏR (MOBİL ÜÇÜN RELOAD) */
        #mobile-reload { position: absolute; bottom: 30px; left: 40px; padding: 15px 25px; background: rgba(231, 76, 60, 0.8); border: 2px solid #fff; color: white; font-weight: bold; border-radius: 50px; cursor: pointer; font-size: 18px; z-index: 30; }

        /* FLASH */
        #muzzle-flash { position: absolute; bottom: 310px; right: 30%; width: 90px; height: 90px; background: radial-gradient(circle, #fff 0%, #f1c40f 40%, rgba(0,0,0,0) 70%); display: none; pointer-events: none; z-index: 25; }
    </style>
</head>
<body>

    <div id="lobby">
        <div id="lobby-header">
            <div id="game-logo">PUBG MOBILE</div>
            <div class="settings-icon" onclick="toggleSettings()">⚙️</div>
        </div>

        <div id="lobby-center">
            <button id="start-btn" onclick="startGame()">START</button>
        </div>

        <div class="lang-selector">
            <button class="lang-btn active" onclick="changeLanguage('az')">AZ</button>
            <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
            <button class="lang-btn" onclick="changeLanguage('tr')">TR</button>
        </div>
    </div>

    <div id="settings-menu">
        <h3 style="text-align:center; color:#f1c40f; margin-bottom:20px;" id="set-title">SETTINGS</h3>
        <div class="settings-row">
            <span id="set-audio">Səs Effektləri:</span>
            <input type="checkbox" id="audio-toggle" checked>
        </div>
        <div class="settings-row">
            <span id="set-diff">Çətinlik (Bot Sürəti):</span>
            <select id="difficulty-select">
                <option value="easy">Easy (Yavaş)</option>
                <option value="hard" selected>Hard (PUBG Pro)</option>
            </select>
        </div>
        <button id="close-settings" onclick="toggleSettings()">OK</button>
    </div>

    <div id="game-container">
        <div id="hud">
            <div class="hud-box" id="hud-score">SCORE: <span id="score">0</span></div>
            <div class="hud-box" id="hud-timer">TIME: <span id="timer">45</span>s</div>
            <div class="hud-box" id="ammo-hud"><span id="hud-mag">MAG</span> <span id="ammo">30</span>/30</div>
        </div>

        <div id="crosshair"></div>
        <div id="hitmarker"></div>
        <div id="muzzle-flash"></div>

        <div id="weapon-wrapper">
            <svg viewBox="0 0 200 100" width="100%">
                <rect x="140" y="45" width="45" height="15" fill="#1c1e22" rx="3"/>
                <rect x="50" y="35" width="90" height="25" fill="#2c3e50"/>
                <path d="M 85 60 L 75 90 L 90 90 L 100 60 Z" fill="#111"/> <rect x="5" y="43" width="45" height="7" fill="#7f8c8d"/>
                <rect x="70" y="27" width="25" height="8" fill="#d35400"/>
            </svg>
        </div>

        <button id="mobile-reload" onclick="startReload()">RELOAD</button>
    </div>

    <script>
        // Dillər Sistemi
        const dictionary = {
            az: { start: "OYUNA BAŞLA", set_title: "AYARLAR", audio: "Səs Effektləri", diff: "Botların Sürəti", score: "XAL", time: "ZAMAN", mag: "ŞARJOR", alert: "OYUN BİTDİ! TOPLADAN XAL: " },
            en: { start: "START GAME", set_title: "SETTINGS", audio: "Audio Effects", diff: "Bot Speed", score: "SCORE", time: "TIME", mag: "MAG", alert: "GAME OVER! YOUR SCORE: " },
            tr: { start: "OYUNA BAŞLA", set_title: "AYARLAR", audio: "Ses Efektleri", diff: "Bot Hızı", score: "SKOR", time: "SÜRE", mag: "ŞÖRJAR", alert: "OYUN BİTTİ! SKORUNUZ: " }
        };

        let lang = 'az';
        let score = 0;
        let ammo = 30;
        let timeLeft = 45;
        let isReloading = false;
        let isSettingsOpen = false;
        let gameLoop;
        let botInterval;

        // EKRAZ DONMƏ VƏ FULLSCREEN FUNTKSİYASI
        function forceLandscapeAndFullscreen() {
            const docEl = document.documentElement;
            
            // Fullscreen Aktiv et
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen();
            } else if (docEl.mozRequestFullScreen) { /* Firefox */
                docEl.mozRequestFullScreen();
            } else if (docEl.webkitRequestFullscreen) { /* Chrome, Safari, Opera */
                docEl.webkitRequestFullscreen();
            } else if (docEl.msRequestFullscreen) { /* IE/Edge */
                docEl.msRequestFullscreen();
            }

            // Ekranı Üfüqi (Yan) Döndər
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(function(error) {
                    console.log("Ekran dönməsi cihaz tərəfindən bloklandı: ", error);
                });
            }
        }

        // İlk toxunuşda ekranı döndərmək üçün klik izləyicisi
        document.addEventListener('click', function initScreen() {
            forceLandscapeAndFullscreen();
            document.removeEventListener('click', initScreen); // Yalnız ilk klikdə işləsin
        });

        function changeLanguage(selectedLang) {
            lang = selectedLang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('start-btn').innerText = dictionary[lang].start;
            document.getElementById('set-title').innerText = dictionary[lang].set_title;
            document.getElementById('set-audio').innerText = dictionary[lang].audio + ":";
            document.getElementById('set-diff').innerText = dictionary[lang].diff + ":";
        }

        function toggleSettings() {
            isSettingsOpen = !isSettingsOpen;
            document.getElementById('settings-menu').style.display = isSettingsOpen ? 'block' : 'none';
        }

        // Səs generatoru
        function playSound(freq, type, duration) {
            if (!document.getElementById('audio-toggle').checked) return;
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if(type === 'sawtooth') osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + duration);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + duration);
        }

        function startGame() {
            if (isSettingsOpen) return;
            forceLandscapeAndFullscreen(); // Oyuna başlayanda bir daha sığorta olaraq işləsin
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            score = 0; ammo = 30; timeLeft = 45; isReloading = false;
            updateHUD();

            // Saniyə taymeri
            gameLoop = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) endGame();
            }, 1000);

            // Bot yaratma sürəti tənzimləməyə görə dəyişir
            const speed = document.getElementById('difficulty-select').value === 'easy' ? 1400 : 800;
            botInterval = setInterval(createBot, speed);
        }

        function updateHUD() {
            document.getElementById('hud-score').innerHTML = `${dictionary[lang].score}: <span id="score">${score}</span>`;
            document.getElementById('hud-timer').innerHTML = `${dictionary[lang].time}: <span id="timer">${timeLeft}</span>s`;
            document.getElementById('ammo-hud').innerHTML = `<span id="hud-mag">${dictionary[lang].mag}</span> <span id="ammo">${ammo}</span>/30`;
        }

        function createBot() {
            if(document.querySelectorAll('.target').length >= 4) return;
            const bot = document.createElement('div');
            bot.className = 'target';
            bot.innerText = 'TARGET';
            
            const x = Math.random() * (window.innerWidth - 120) + 40;
            const y = Math.random() * (window.innerHeight - 300) + 100;
            bot.style.left = `${x}px`;
            bot.style.top = `${y}px`;
            
            document.getElementById('game-container').appendChild(bot);

            bot.addEventListener('mousedown', (e) => {
                if(ammo > 0 && !isReloading) {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    
                    // Hitmarker
                    const hm = document.getElementById('hitmarker');
                    hm.style.display = 'block';
                    setTimeout(() => hm.style.display = 'none', 60);
                    
                    bot.remove();
                    e.stopPropagation();
                    fireWeapon();
                }
            });

            const maxLife = document.getElementById('difficulty-select').value === 'easy' ? 3000 : 1800;
            setTimeout(() => { if(bot.parentNode) bot.remove(); }, maxLife);
        }

        function fireWeapon() {
            ammo--;
            document.getElementById('ammo').innerText = ammo;
            playSound(480, 'sawtooth', 0.07); // Atəş səsi

            const wp = document.getElementById('weapon-wrapper');
            const fl = document.getElementById('muzzle-flash');
            wp.classList.add('shoot-recoil');
            fl.style.display = 'block';

            setTimeout(() => {
                wp.classList.remove('shoot-recoil');
                fl.style.display = 'none';
            }, 45);
        }

        // Boşa atəş açanda
        document.getElementById('game-container').addEventListener('mousedown', () => {
            if(isReloading || ammo <= 0) return;
            fireWeapon();
        });

        // Real Şarjor Doldurma (Reload)
        function startReload() {
            if (ammo === 30 || isReloading) return;
            isReloading = true;
            
            playSound(180, 'triangle', 0.4); // Maqazin çıxma səsi
            const wp = document.getElementById('weapon-wrapper');
            wp.classList.add('reload-animation');
            document.getElementById('ammo-hud').innerText = "RELOADING...";

            setTimeout(() => {
                ammo = 30;
                wp.classList.remove('reload-animation');
                updateHUD();
                isReloading = false;
            }, 1300); // 1.3 saniyəlik əsl reload animasiya vaxtı
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') startReload();
        });

        function endGame() {
            clearInterval(gameLoop);
            clearInterval(botInterval);
            alert(dictionary[lang].alert + score);
            document.querySelectorAll('.target').forEach(b => b.remove());
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('lobby').style.display = 'flex';
        }
    </script>
</body>
</html>
