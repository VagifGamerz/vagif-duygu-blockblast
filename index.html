<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vagif & Duygu | Real Block Blast</title>
    <style>
        :root { --main: #ffcc00; --bg: #0f0f0f; --cell: #252525; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); color: white; font-family: sans-serif; touch-action: none; }
        
        /* Start Screen */
        #start-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .start-btn { padding: 15px 50px; font-size: 1.5rem; background: var(--main); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px var(--main); }

        /* Game UI */
        #game-container { display: none; flex-direction: column; height: 100vh; align-items: center; justify-content: center; }
        .header { width: 100%; position: absolute; top: 0; padding: 15px 0; background: #1a1a1a; display: flex; justify-content: space-around; border-bottom: 2px solid var(--main); font-weight: bold; }

        /* Grid */
        #grid { display: grid; grid-template-columns: repeat(8, 42px); grid-template-rows: repeat(8, 42px); gap: 4px; background: #333; padding: 8px; border-radius: 8px; position: relative; }
        .cell { width: 42px; height: 42px; background: var(--cell); border-radius: 4px; transition: 0.1s; }
        .filled { background: var(--main) !important; border: 1px solid #fff; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        /* Bottom Pieces */
        #pieces-container { display: flex; justify-content: space-around; align-items: center; width: 100%; height: 150px; margin-top: 30px; }
        .piece { display: grid; gap: 2px; cursor: grab; position: relative; transition: opacity 0.3s; }
        .piece div { background: var(--main); border-radius: 3px; width: 25px; height: 25px; }

        /* Game Over */
        #game-over { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .over-box { background: #222; padding: 30px; border-radius: 20px; border: 2px solid var(--main); text-align: center; width: 80%; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:var(--main)">VAGIF & DUYGU</h1>
        <p style="margin-top:-15px; color:#888">BLOCK BLAST EDITION</p>
        <button class="start-btn" onclick="startGame()">BAŞLAT</button>
    </div>

    <div id="game-container">
        <div class="header">
            <div>SCORE: <span id="score">0</span></div>
            <div>HIGH: <span id="high">0</span></div>
        </div>
        <div id="grid"></div>
        <div id="pieces-container"></div>
    </div>

    <div id="game-over">
        <div class="over-box">
            <h1 style="color:red">GAME OVER</h1>
            <h2 id="final-score">XAL: 0</h2>
            <button class="start-btn" onclick="location.reload()" style="font-size:1rem; padding:10px 30px">EXIT / RESTART</button>
        </div>
    </div>

    <script>
        let score = 0;
        let high = localStorage.getItem('vd_high') || 0;
        document.getElementById('high').innerText = high;
        const gridCells = [];
        let boardState = Array(64).fill(0);

        function startGame() {
            let e = document.documentElement;
            if (e.requestFullscreen) e.requestFullscreen();
            else if (e.webkitRequestFullscreen) e.webkitRequestFullscreen();

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            initGrid();
            spawnPieces();
        }

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                grid.appendChild(cell);
                gridCells.push(cell);
            }
        }

        const shapes = [
            { s: [[1, 1], [1, 1]], w: 2 }, // Kvadrat
            { s: [[1, 1, 1]], w: 3 },      // Uzun
            { s: [[1], [1], [1]], w: 1 },  // Dik
            { s: [[1]], w: 1 }             // Tək
        ];

        function spawnPieces() {
            const container = document.getElementById('pieces-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const sh = shapes[Math.floor(Math.random() * shapes.length)];
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.style.gridTemplateColumns = `repeat(${sh.w}, 25px)`;
                
                sh.s.flat().forEach(v => {
                    const d = document.createElement('div');
                    if (!v) d.style.visibility = 'hidden';
                    piece.appendChild(d);
                });

                handleDrag(piece, sh);
                container.appendChild(piece);
            }
        }

        function handleDrag(p, sh) {
            p.ontouchstart = (e) => {
                let touch = e.touches[0];
                let rect = p.getBoundingClientRect();
                let offsetX = touch.clientX - rect.left;
                let offsetY = touch.clientY - rect.top;

                p.style.position = 'fixed';
                p.style.zIndex = '1000';
                p.style.transform = 'scale(1.2)';

                const move = (te) => {
                    p.style.left = te.touches[0].clientX - offsetX + 'px';
                    p.style.top = te.touches[0].clientY - offsetY + 'px';
                };

                const end = (te) => {
                    document.removeEventListener('touchmove', move);
                    document.removeEventListener('touchend', end);
                    
                    p.style.display = 'none';
                    let dropElem = document.elementFromPoint(te.changedTouches[0].clientX, te.changedTouches[0].clientY);
                    p.style.display = 'grid';

                    let cellIdx = gridCells.indexOf(dropElem);
                    if (cellIdx !== -1 && boardState[cellIdx] === 0) {
                        boardState[cellIdx] = 1;
                        gridCells[cellIdx].classList.add('filled');
                        score += 10;
                        document.getElementById('score').innerText = score;
                        p.remove();
                        if (document.getElementById('pieces-container').children.length === 0) spawnPieces();
                        checkLines();
                    } else {
                        p.style.position = 'relative';
                        p.style.left = '0'; p.style.top = '0';
                        p.style.transform = 'scale(1)';
                    }
                };

                document.addEventListener('touchmove', move);
                document.addEventListener('touchend', end);
            };
        }

        function checkLines() {
            // Sıra partlatma (Sadeləşdirilmiş)
            if (score > high) {
                high = score;
                localStorage.setItem('vd_high', high);
                document.getElementById('high').innerText = high;
            }
            // Əgər yer yoxdursa: showGameOver() çağıra bilərsən
        }

        function showGameOver() {
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-score').innerText = "XAL: " + score;
        }
    </script>
</body>
</html>
