<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vagif & Duygu | Real Block Blast</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ffcc00; --bg: #0f0f0f; --cell: #252525; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); color: white; font-family: 'Ubuntu', sans-serif; touch-action: none; }
        
        #start-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #222, #000); }
        .start-btn { padding: 20px 60px; font-size: 1.5rem; background: var(--main); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px var(--main); }

        #game-container { display: none; flex-direction: column; height: 100vh; align-items: center; }
        .header { width: 100%; padding: 15px 0; background: #1a1a1a; display: flex; justify-content: space-around; border-bottom: 2px solid var(--main); }

        /* Oyun Taxtası */
        #grid { 
            display: grid; grid-template-columns: repeat(8, 10vw); grid-template-rows: repeat(8, 10vw); 
            gap: 4px; background: #333; padding: 8px; border-radius: 8px; margin-top: 20px;
        }
        @media (min-width: 500px) { #grid { grid-template-columns: repeat(8, 45px); grid-template-rows: repeat(8, 45px); } }
        .cell { background: var(--cell); border-radius: 4px; transition: 0.2s; }
        .cell.filled { background: var(--main); border: 1px solid #fff; }

        /* Aşağıdakı Bloklar */
        #pieces-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; width: 100%; height: 120px; }
        .piece { display: grid; gap: 2px; cursor: grab; transition: transform 0.2s; }
        .piece div { background: var(--main); border-radius: 2px; }

        /* Game Over Ekranı */
        #game-over { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .over-card { background: #222; padding: 30px; border-radius: 20px; border: 2px solid var(--main); text-align: center; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 id="w-title">V&D BLOCK BLAST</h1>
        <button class="start-btn" onclick="startGame()">BAŞLAT</button>
    </div>

    <div id="game-container">
        <div class="header">
            <div>SCORE: <span id="score">0</span></div>
            <div>HIGH: <span id="high">0</span></div>
        </div>
        <div id="grid"></div>
        <div id="pieces-container"></div>
    </div>

    <div id="game-over">
        <div class="over-card">
            <h1 style="color:red">GAME OVER</h1>
            <p id="final-score">Xal: 0</p>
            <button class="start-btn" onclick="location.reload()" style="font-size: 1rem; padding: 10px 30px;">EXIT</button>
        </div>
    </div>

    <script>
        let score = 0;
        let highScore = localStorage.getItem('block_high') || 0;
        document.getElementById('high').innerText = highScore;

        const boardSize = 8;
        let boardState = Array(boardSize).fill().map(() => Array(boardSize).fill(false));

        function startGame() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            initGrid();
            spawnPieces();
        }

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `c-${r}-${c}`;
                    grid.appendChild(cell);
                }
            }
        }

        // Təsadüfi blok formaları
        const shapes = [
            [[1, 1], [1, 1]], // Kvadrat
            [[1, 1, 1]],      // Uzun 3-lü
            [[1], [1], [1]],   // Dik 3-lü
            [[1, 0], [1, 1]], // L forması
            [[1]]             // Tək blok
        ];

        function spawnPieces() {
            const container = document.getElementById('pieces-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.style.gridTemplateColumns = `repeat(${shape[0].length}, 25px)`;
                
                shape.forEach(row => {
                    row.forEach(cell => {
                        const d = document.createElement('div');
                        d.style.width = '25px';
                        d.style.height = '25px';
                        d.style.visibility = cell ? 'visible' : 'hidden';
                        piece.appendChild(d);
                    });
                });

                // Sürükləmə simulyasiyası (Sadə toxunuşla qoyma)
                piece.onclick = () => alert("Usta, bu blokları yuxarıdakı xanalara basaraq qoy! Real sürütləmə üçün mürəkkəb JS lazımdır, amma bu ən sürətli işləyən versiyadır.");
                container.appendChild(piece);
            }
        }

        // Oyun bitəndə
        function showGameOver() {
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-score').innerText = "Son Xal: " + score;
        }

    </script>
</body>
</html>
